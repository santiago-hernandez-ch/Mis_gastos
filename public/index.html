<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIS GASTOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>MIS GASTOS</h1>
    </header>

    <div id="setupScreen" class="screen active">
      <div class="setup-form">
        <h2>Configura tu día</h2>
        <form id="setupForm">
          <div class="form-group">
            <label for="dayName">Nombre del día</label>
            <input 
              type="text" 
              id="dayName" 
              placeholder="ej: Lunes 19 de marzo"
              required
            >
          </div>
          <div class="form-group">
            <label for="budget">Presupuesto límite</label>
            <input 
              type="number" 
              id="budget" 
              placeholder="ej: 50000"
              min="0"
              step="100"
              required
            >
          </div>
          <div class="form-group">
            <button type="submit" class="btn primary">Comenzar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="dashboardScreen" class="screen">
      <div class="info-header">
        <div class="info-item">
          <span class="info-label">Día</span>
          <span class="info-value" id="displayDay">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Presupuesto</span>
          <span class="info-value" id="displayBudget">$0</span>
        </div>
      </div>

      <div id="alertsContainer"></div>

      <div class="dashboard">
        <div>
          <div class="card">
            <h3>Registrar gasto</h3>
            <div class="expense-form">
              <form id="expenseForm">
                <div class="form-group">
                  <label for="description">Descripción</label>
                  <input 
                    type="text" 
                    id="description" 
                    placeholder="ej: Café"
                    required
                  >
                </div>
                <div class="form-group">
                  <label for="amount">Monto (COP)</label>
                  <input 
                    type="number" 
                    id="amount" 
                    placeholder="ej: 5000"
                    min="0"
                    step="100"
                    required
                  >
                </div>
                <div class="form-group">
                  <label for="category">Categoría</label>
                  <select id="category" required>
                    <option value="">Selecciona una categoría</option>
                    <option value="comida">Comida</option>
                    <option value="transporte">Transporte</option>
                    <option value="entretenimiento">Entretenimiento</option>
                    <option value="servicios">Servicios/Facturas</option>
                    <option value="estudio">Estudio Poli</option>
                    <option value="gustos">Gustos culposos</option>
                  </select>
                </div>
                <button type="submit" class="btn primary">Guardar gasto</button>
              </form>
            </div>
          </div>

          <div class="card">
            <h3>Gastos registrados</h3>
            <div id="expensesList" class="expense-list">
              <div class="empty-state">
                <p>No hay gastos registrados!!</p>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="card">
            <h3>Resumen del día</h3>
            <div class="summary">
              <div class="summary-row">
                <span class="summary-label">Total gastado</span>
                <span class="summary-value" id="totalSpent">$0</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Presupuesto</span>
                <span class="summary-value" id="summaryBudget">$0</span>
              </div>
              <div class="summary-row available" id="availableRow">
                <span class="summary-label">Disponible</span>
                <span class="summary-value" id="available">$0</span>
              </div>
              <div id="excessRow" class="summary-row excess" style="display: none;">
                <span class="summary-label">EXCEDIDO</span>
                <span class="summary-value" id="excess">+$0</span>
              </div>
              
              <div class="categories">
                <h4>Desglose por categoría</h4>
                <div id="categoryBreakdown"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="nav-buttons">
        <button id="resetBtn" class="btn secondary">Nuevo día</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
